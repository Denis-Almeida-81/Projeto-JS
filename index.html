<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Conversor de Moedas</title>
</head>

<body>
    <img class="logo-conversor" src="./assepts/logo1.png" alt="logo conversor de moedas" class="logo">
    <main>

        <label>Converter <b>de</b>
            <select class="select-currency">
                <option value="real">R$ Real brasileiro</option>
            </select>
        </label>

        <label>Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra esterlina</option>
                <option value="bitcoin">฿ Bitcoin</option>
            </select>
        </label>

        <label>Valor
            <input class="input-currency"  placeholder="R$10.000,00">
        </label>

        <button class="convert-button">Converter</button>

        <section>

            <div class="currency-box">
                <img src="./assepts/real.png" alt="imagem real brasileiro">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img class="arrow-img" src="./assepts/seta.png" alt="imagem de seta">

            <div class="currency-box">
                <img class="currency-img" src="./assepts/dólar.png" alt="imagem dolar americano">
                <p class="currency" id ="currency-name">Dólar americano</p>
                <p class="currency-value">US$ 0,00</p>
            </div>
        </section>
    </main>

</body>
<script src="./scripts.js"></script>

</html>
